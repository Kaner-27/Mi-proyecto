<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La mujer que amo 💖</title>

<style>
body{
  font-family: Arial;
  background:#f3e1f8;
  padding:20px;
}

textarea{
  width:100%;
  height:200px;
  padding:15px;
  font-size:16px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  margin-top:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#7b1b67;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#estado{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>💌 Nuestro diario compartido</h2>

<textarea id="diario" placeholder="Escribe algo bonito..."></textarea>

<br>

<button onclick="guardarTexto()">Guardar 💾</button>

<p id="estado"></p>

<!-- 🔥 FIREBASE MODULAR -->
<script type="module">

// ================= FIREBASE IMPORTS =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

// ================= TU CONFIG REAL =================
const firebaseConfig = {
  apiKey: "AIzaSyD0CteuZMvv6qU5mZXyYoM4GaUrGQoACG8",
  authDomain: "mi-chat-bcfce.firebaseapp.com",
  databaseURL: "https://mi-chat-bcfce-default-rtdb.firebaseio.com",
  projectId: "mi-chat-bcfce",
  storageBucket: "mi-chat-bcfce.firebasestorage.app",
  messagingSenderId: "953382792651",
  appId: "1:953382792651:web:72126c50ba4a74ecddda4e",
  measurementId: "G-1EY54KYEN6"
};

// ================= INICIALIZAR FIREBASE =================
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= ELEMENTOS =================
const diario = document.getElementById("diario");
const estado = document.getElementById("estado");

// ================= GUARDAR TEXTO =================
window.guardarTexto = async function () {
  try {
    await setDoc(doc(db, "diario", "texto"), {
      texto: diario.value
    });

    estado.innerText = "Guardado 💖";

    setTimeout(() => {
      estado.innerText = "";
    }, 2000);

  } catch (error) {
    console.log(error);
    estado.innerText = "Error al guardar 💔";
  }
};

// ================= TIEMPO REAL =================
onSnapshot(doc(db, "diario", "texto"), (docSnap) => {
  if (docSnap.exists()) {
    diario.value = docSnap.data().texto;
  }
});

</script>

</body>
</html>
